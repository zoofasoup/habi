<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habi Herbal Alam - Coming Soon</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="Habi Herbal Alam is coming soon. Get ready for fresh, natural herbal products.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div id="game-container">
        <!-- Game Canvas -->
        <canvas id="game-canvas"></canvas>
        
        <!-- UI Overlay -->
        <div id="ui-layer">
            <div id="score-display">Score: <span id="score">0</span></div>
            <div id="lives-display">Lives: <span id="lives">3</span></div>
        </div>
        
        <!-- Start Screen -->
        <div id="start-screen" class="glass-card screen active">
            <div class="logo-container">
                <img src="logo.png" alt="Habi Herbal Alam Logo" class="logo">
            </div>
            <h1 class="title">Nature's Catch</h1>
            <p class="subtitle">Catch the fresh herbs, avoid the rocks! Get 50 points to unlock our secret waitlist.</p>
            <button id="start-btn">Play Game</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="glass-card screen">
            <h2 class="title" id="end-title">Game Over</h2>
            <p class="subtitle" id="end-subtitle">You scored <span id="final-score">0</span> points.</p>
            
            <div id="waitlist-section" style="display: none;">
                <p class="subtitle">You unlocked the waitlist! Be the first to know when we launch.</p>
                <form class="notify-form" id="notify-form">
                    <div class="input-group">
                        <input type="email" id="email-input" placeholder="Enter your email address" required>
                        <button type="submit" id="notify-btn">Notify Me</button>
                    </div>
                    <p class="success-message" id="success-msg">Thanks! We'll keep you updated.</p>
                </form>
            </div>
            
            <button id="restart-btn">Play Again</button>
        </div>
    </div>

    <!-- Hidden image for canvas drawing -->
    <img src="logo.png" id="logo-img" style="display: none;">

    <script src="script.js"></script>
</body>
</html>
