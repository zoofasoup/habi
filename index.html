<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habi Herbal Alam - Nurturing Nature</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="Habi Herbal Alam is growing. Nurture the plant to join our waitlist.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <main class="container">
        
        <!-- Interactive Plant Area -->
        <div class="interaction-area" id="plant-container">
            <h1 class="title" id="main-title">Nurture to Grow</h1>
            <p class="subtitle" id="main-subtitle">Click to water the seed and watch it bloom.</p>
            
            <div class="pot-container">
                <div class="plant-stage stage-0 active" id="stage-0">
                    <div class="seed"></div>
                </div>
                <div class="plant-stage stage-1" id="stage-1">
                    <div class="sprout"></div>
                </div>
                <div class="plant-stage stage-2" id="stage-2">
                    <div class="stem">
                        <div class="leaf leaf-left"></div>
                        <div class="leaf leaf-right"></div>
                    </div>
                </div>
                <div class="plant-stage stage-3" id="stage-3">
                    <img src="logo.png" alt="Habi Blooming" class="bloomed-logo">
                </div>
                <div class="pot"></div>
            </div>
            
            <div class="progress-indicator">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>

        <!-- Waitlist Form (Hidden Initially) -->
        <div class="glass-card hidden" id="waitlist-card">
            <img src="logo.png" alt="Habi Logo" class="form-logo" id="form-logo">
            <h2 class="title">Nature's Touch</h2>
            <p class="subtitle">Thank you for nurturing our growth. Join the waitlist to be the first to experience Habi Herbal Alam.</p>
            
            <form class="notify-form" id="notify-form">
                <div class="input-group">
                    <input type="email" id="email-input" placeholder="Enter your email address" required>
                    <button type="submit" id="notify-btn">Notify Me</button>
                </div>
                <p class="error-message" id="error-msg" style="display: none; color: #d9534f; font-size: 0.9rem; margin-top: 10px;">Please enter a valid email address.</p>
                <p class="success-message" id="success-msg">Thanks! We'll keep you updated on our launch.</p>
            </form>
        </div>
        
    </main>

    <script src="script.js"></script>
</body>
</html>
