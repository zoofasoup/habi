<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habi Herbal Alam - Coming Soon</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="description" content="Habi Herbal Alam is coming soon. Get ready for fresh, natural herbal products.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <main class="container">
        <div class="glass-card">
            <div class="logo-container">
                <!-- Using the logo uploaded by the user -->
                <img src="logo.png" alt="Habi Herbal Alam Logo" class="logo" id="brand-logo">
            </div>
            
            <h1 class="title">Nature's touch,<br>coming soon.</h1>
            <p class="subtitle">We are crafting something fresh, natural, and herbal. Join the waitlist to be the first to know when we launch.</p>
            
            <form class="notify-form" id="notify-form">
                <div class="input-group">
                    <input type="email" id="email-input" placeholder="Enter your email address" required>
                    <button type="submit" id="notify-btn">Notify Me</button>
                </div>
                <p class="success-message" id="success-msg">Thanks! We'll keep you updated.</p>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
